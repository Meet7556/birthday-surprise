<!DOCTYPE html>
<html>
<head>
<title>Special Birthday Page</title>

<style>

body{
text-align:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
padding:30px;
margin:0;
}

/* Title */

h1{
color:#ff2e63;
font-size:40px;
}

/* Cake */

.cake{
font-size:90px;
margin:20px;
}

/* Button */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff416c;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Quotes */

.quote{
font-size:22px;
margin:15px;
font-style:italic;
color:#333;
}

/* 3D Carousel */

.carousel{
width:320px;
height:220px;
margin:40px auto;
perspective:1000px;
}

.carousel-inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:rotate 18s infinite linear;
}

.carousel-inner img{
position:absolute;
width:300px;
height:200px;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.carousel-inner img:nth-child(1){transform:rotateY(0deg) translateZ(400px);}
.carousel-inner img:nth-child(2){transform:rotateY(60deg) translateZ(400px);}
.carousel-inner img:nth-child(3){transform:rotateY(120deg) translateZ(400px);}
.carousel-inner img:nth-child(4){transform:rotateY(180deg) translateZ(400px);}
.carousel-inner img:nth-child(5){transform:rotateY(240deg) translateZ(400px);}
.carousel-inner img:nth-child(6){transform:rotateY(300deg) translateZ(400px);}

/* Rotation animation */

@keyframes rotate{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(360deg);}
}

/* Flower animation */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<h1>💖 Special Birthday Page 💖</h1>

<div id="cake" class="cake">🎂</div>

<button onclick="cutCake()">Cut the Cake 🎂</button>

<!-- Quotes -->

<div class="quote">"A best friend makes life brighter." ✨</div>
<div class="quote">"True friendship is the greatest gift." 🎁</div>
<div class="quote">"Best friends create memories forever." 📸</div>
<div class="quote">"Life is better with a best friend like you." ❤️</div>
<div class="quote">"A real friend is one soul in two bodies." 💖</div>

<!-- Photo Carousel -->

<h2>📸 your cute moment</h2>

<div class="carousel">
<div class="carousel-inner">

<img src="cute.jpg">
<img src="meet2.jpeg">
<img src="meet3.jpeg">
<img src="meet4.jpeg">
<img src="meet5.jpeg">
<img src="meet6.jpg">

</div>
</div>

<!-- Birthday Music -->

<audio autoplay loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* Cake cutting */

function cutCake(){

document.getElementById("cake").innerHTML="🍰";

/* Flower rain */

for(let i=0;i<80;i++){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(flower);

}

}

</script>

</body>
</html>
