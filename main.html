<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
overflow:hidden;
}

/* Title */

h1{
font-size:50px;
color:#ff2e63;
animation: glow 2s infinite alternate;
}

/* Glow animation */

@keyframes glow{

from{
text-shadow:0 0 10px #fff,0 0 20px #ff4da6;
}

to{
text-shadow:0 0 20px #fff,0 0 40px #ff1a75;
}

}

/* Button */

button{
margin-top:30px;
padding:14px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Floating flowers */

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(0);
}

100%{
transform:translateY(100vh);
}

}

</style>

</head>

<body>

<h1>Happiest birthday bestuu 🫶🎉 <br>
God bless you with all the happiness 😊🤍</h1>

<p>Click below for a special surprise 💖</p>

<button onclick="nextPage()">Open Surprise</button>

<script>

/* Next page */

function nextPage(){

window.location.href="quotes.html";

}

/* Background flower animation */

for(let i=0;i<25;i++){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(flower);

}

</script>

</body>
</html>
